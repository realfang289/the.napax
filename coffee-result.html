<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coffee Result</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

.box {
  max-width: 500px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 15px;
}

img {
  width: 100%;
  height: auto;
  border-radius: 16px;
  margin-bottom: 20px;
  background: #000;
}

p {
  opacity: 0.9;
  white-space: pre-line;
  text-align: left;
  line-height: 1.7;
  font-size: 14px;
}

.buttons {
  margin-top: 25px;
}

.btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  background: white;
  color: black;
}

.btn:active {
  transform: scale(0.97);
  opacity: 0.8;
}

.fade {
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="box fade">
  <h1 id="title"></h1>

  <img id="image" src="">

  <p id="desc"></p>

  <div class="buttons">
    <a href="quiz2.html" class="btn">🔄 ทำแบบทดสอบอีกครั้ง</a>
    <button class="btn" onclick="shareResult()">📲 แชร์ผลลัพธ์</button>
    <button class="btn" onclick="shareLink()">🔗 แชร์แบบทดสอบ</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

let title = "ไม่พบผลลัพธ์";
let desc = "กรุณาทำแบบทดสอบใหม่";
let image = "";

if(type === "espresso"){
  title = "☕ ESPRESSO";
  image = "espresso.jpg";
  desc = `คุณเป็นประเภทเอสเพรสโซ่ มักเป็นคนตรงไปตรงมา ไม่ชอบอ้อมค้อม พูดอะไรก็พูดชัดเจน มีเป้าหมายชัดเจนและมุ่งมั่นสูง
มีความเป็นตัวของตัวเอง เด็ดเดี่ยว จิตใจแน่วแน่ ชอบความเข้มข้นแท้ ๆ ไม่ต้องประดับด้วยความหวานหรือฟองนม
นิสัยเด่นคือมีความเป็นผู้นำ เป็นคนที่เพื่อนไว้ใจ ทำงานเร็ว มีประสิทธิภาพ และปรับตัวเก่ง
จริงใจ ไม่ชอบเอาเปรียบใคร และไม่ชอบให้ใครเอาเปรียบ รอบคอบ วางแผนก่อนลงมือ แต่บางครั้งอาจดูจริงจังหรือใจร้อนเล็กน้อย
โดยรวมคือเธอเป็นคนที่มั่นใจ เข้มข้น มีสไตล์ เป็นตัวเองสูง ชีวิตเต็มไปด้วยพลังงาน`;
}
else if(type === "americano"){
  title = "☕ AMERICANO";
  image = "americano.jpg";
  desc = `คุณเป็นประเภทอเมริกาโน คนเรียบง่าย ไม่ชอบอะไรซับซ้อน แต่มีรสนิยมชัดเจน
มีความเป็นตัวของตัวเองสูง ไม่ตามกระแสง่ายๆ
ชอบความจริงจัง โฟกัสงานหรือเป้าหมายในชีวิต
ภายนอกดูนิ่ง สุขุม แต่ข้างในมีความคิดลึกและละเอียด
เป็นคนรักอิสระ ไม่ชอบความหวานเลี่ยนทั้งในเครื่องดื่มและความสัมพันธ์`;
}
else if(type === "latte"){
  title = "☕ LATTE";
  image = "latte.jpg";
  desc = `คุณเป็นประเภทลาเต้คุณคือสายอบอุ่น อ่อนโยน
เข้ากับคนง่าย และสร้างบรรยากาศดีๆ
เป็นคนที่ใครอยู่ใกล้ก็สบายใจ มักเป็นคนนุ่มนวล อ่อนโยน ชอบความหวานละมุนและความอบอุ่นในชีวิต
นิสัยเด่นคือเฟรนลี่ ใส่ใจคนอื่น ใจดี และมักเป็นคนที่เพื่อน ๆ มาปรึกษาเรื่องความรู้สึก
เธอโรแมนติก ละเอียดอ่อนในรายละเอียด และมักมีมุมมองชีวิตที่อบอุ่น`;
}
else if(type === "energy"){
  title = "⚡ กาแฟผสมกระทิงแดง";
  image = "energycoffee.jpg";
  desc = `คุณเป็นประเภทกาแฟผสมกระทิงแดงมักเป็นคนสุดโต่ง พลังงานล้นเหลือ 
ชอบความเข้มข้นแบบจัดเต็มทั้งกาแฟและความมันส์ของเครื่องชูกำลัง
นิสัยเด่นคือบ้าพลัง ไม่กลัวเหนื่อย ทำงานหนัก เล่นหนัก ชีวิตต้องมันส์ตลอดเวลา
โดยรวมคือคนที่มีไฟสูง ดุดัน แต่ขยันและไม่ยอมแพ้ง่าย`;
}
else if(type === "mocha"){
  title = "🍫 MOCHA";
  image = "mocha.jpg";
  desc = `คุณเป็นประเภทมอคค่า คุณคือสายโรแมนติก มีเสน่ห์
ชอบความหวานผสมความลึกซึ้ง เป็นคนที่มีมิติและน่าค้นหา
รักความสนุก แต่ลึกๆ มีความคิดจริงจัง`;
}
else if(type === "caramel"){
  title = "🍯 CARAMEL MACCHIATO";
  image = "caramel.jpg";
  desc = `คุณเป็นประเภท CARAMEL MACCHIATO เข้ากับคนง่าย มีพลังบวก
ภายนอกดูสุขุม แต่ซ่อนความหวานละมุนไว้ภายใน
มีความเป็นผู้ใหญ่และน่าค้นหา`;
}

document.getElementById("title").innerText = title;
document.getElementById("desc").innerText = desc;
document.getElementById("image").src = image;

/* แชร์ผล */
function shareResult(){
  const text = "ฉันได้ผลลัพธ์: " + title;

  if(navigator.share){
    navigator.share({
      title: "Coffee Personality",
      text: text,
      url: window.location.href
    });
  } else {
    alert("แชร์ได้เลย:\n" + text);
  }
}

/* แชร์ลิงก์ */
function shareLink(){
  const url = window.location.origin + "/quiz2.html";
  const text = "มาลองทำแบบทดสอบกาแฟกัน ☕🔥";

  if(navigator.share){
    navigator.share({
      title: "Coffee Personality",
      text: text,
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert("📋 คัดลอกลิงก์แล้ว!");
  }
}
</script>

</body>
</html>
