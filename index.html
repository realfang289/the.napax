<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Personality Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 60px 20px 20px;
}

.header h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 20px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* TEXT */
.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
}

.card p {
  opacity: 0.7;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🖤ค้นหาตัวตนของคุณ🖤</h1>
  <p>เลือกแบบทดสอบที่คุณสนใจ</p>
</div>

<div class="grid">

  <!-- QUIZ 1 -->
  <a href="quiz1.html" class="card">
    <img src="1.jpg">
    <div class="card-content">
      <h2>👑คุณเป็นผู้หญิงแบบไหน?👑</h2>
      <p>Alpha / Beta / Omega / Sigma</p>
    </div>
  </a>

  <!-- QUIZ 2 -->
  <a href="quiz2.html" class="card">
    <img src="2.jpg">
    <div class="card-content">
      <h2>☕กาแฟแบบไหนที่บ่งบอกความเป็นตัวตนคุณ☕</h2>
      <p>"คิดสิคิดสิ คาปูชิโน่ เอสเปรสโซ่ อาราบิก้า โรบัสต้า อะไรดีนะ มอคค่า ซุปเปอร์ริช อย่าคิดนาน..."</p>
    </div>
  </a>

  <!-- QUIZ 3 -->
  <a href="#" class="card">
    <img src="3.jpg">
    <div class="card-content">
      <h2>🔥Coming soon.</h2>
      <p>ติดตามเร็วๆนี้</p>
    </div>
  </a>



</div>

</body>
</html>
