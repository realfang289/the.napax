<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<!-- 🔥 สำคัญมาก (มือถือ) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personality Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 10px;
}

.header h1 {
  font-size: 24px;
  margin-bottom: 8px;
}

.header p {
  opacity: 0.6;
  font-size: 14px;
}

/* GRID (มือถือเน้น 1 คอลัมน์) */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 16px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 18px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  transition: 0.25s;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
  -webkit-tap-highlight-color: transparent;
}

/* เวลากดมือถือ */
.card:active {
  transform: scale(0.97);
  opacity: 0.8;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXT */
.card-content {
  padding: 16px;
}

.card h2 {
  margin: 0 0 6px;
  font-size: 16px;
}

.card p {
  opacity: 0.6;
  font-size: 13px;
  line-height: 1.4;
}

/* 📱 Tablet / Desktop */
@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    padding: 30px;
  }

  .header h1 {
    font-size: 30px;
  }
}

</style>
</head>

<body>

<div class="header">
  <h1>🖤ค้นหาตัวตนของคุณ🖤</h1>
  <p>เลือกแบบทดสอบที่คุณสนใจ</p>
</div>

<div class="grid">

  <!-- QUIZ 1 -->
  <a href="quiz1.html" class="card">
    <img src="1.jpg">
    <div class="card-content">
      <h2>👑คุณเป็นผู้หญิงแบบไหน?👑</h2>
      <p>Alpha / Beta / Omega / Sigma</p>
    </div>
  </a>

  <!-- QUIZ 2 -->
  <a href="quiz2.html" class="card">
    <img src="2.jpg">
    <div class="card-content">
      <h2>☕กาแฟแบบไหนที่บ่งบอกความเป็นตัวตนคุณ☕</h2>
      <p>"คิดสิคิดสิ คาปูชิโน่ เอสเปรสโซ่..."</p>
    </div>
  </a>

  <!-- QUIZ 3 -->
<a href="quiz3.html" class="card">
  <img src="3.jpg">
  <div class="card-content">
    <h2>🐺คุณเป็นผู้ชายไทป์ไหน?🐺</h2>
    <p>GOLDEN CAT LION SNAKE WOLF OCTOPUS</p>
  </div>
</a>

<!-- QUIZ 4 -->
<a href="quiz4.html" class="card">
  <img src="4.jpg">
  <div class="card-content">
    <h2>🧠แบบทดสอบMBTI🧠</h2>
    <p>16 ตัวตน</p>
  </div>
</a>

</div>

</body>
</html>
