<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ผลลัพธ์ของคุณ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      padding: 40px;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,255,255,0.05);
    }

    h1 {
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    p {
      opacity: 0.85;
      white-space: pre-line;
      text-align: left;
    }

    a {
      display: inline-block;
      margin-top: 30px;
      border: 1px solid #444;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      border-radius: 10px;
    }

    a:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="box">
  <h1 id="title"></h1>

  <img id="image" src="">

  <p id="desc"></p>

  <a href="index.html">ทำแบบทดสอบอีกครั้ง</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

let title = "ไม่พบผลลัพธ์";
let desc = "กรุณาทำแบบทดสอบใหม่อีกครั้ง";
let image = "";

// 🔥 mapping รูป + ข้อความ (ไม่แก้ข้อความของคุณ)
if (type === "sigma") {
  title = "SIGMA MIND 🖤";
  image = "sigma.jpg";
  desc = `ผู้หญิงแบบ Sigma ความมั่นใจโดยไม่ต้องพึ่งพาการยอมรับจากกลุ่ม
เธอมีบุคลิกที่ลึกลับและเป็นอิสระ พึ่งพาตนเองได้ดีเยี่ยมจนไม่จำเป็นต้องเดินตามกระแสสังคมใดๆ
สามารถอยู่คนเดียวได้อย่างมีความสุข และเลือกคบคนอย่างมีมาตรฐาน
ในความรัก เธอจะเปิดเผยตัวตนจริงๆเฉพาะคนที่เธอเลือกเท่านั้น`;
}
else if (type === "beta") {
  title = "BETA HEART 💖";
  image = "beta.jpg";
  desc = `ผู้หญิงแบบ Beta เป็นคนอ่อนโยน ใจดี และให้ความสำคัญกับความรู้สึกของคนอื่น
เธอเข้ากับคนง่าย มีความเป็นมิตร และสร้างบรรยากาศสบายใจให้คนรอบตัว
มักหลีกเลี่ยงความขัดแย้ง และเลือกใช้ความเข้าใจมากกว่าการปะทะ
เป็นคนที่คอยสนับสนุนและอยู่เคียงข้างคนสำคัญเสมอ
ในความรัก เธอเป็นคนอบอุ่น ดูแลเอาใจใส่ และรักอย่างจริงใจ`;
}
else if (type === "alpha") {
  title = "ALPHA QUEEN 👑";
  image = "alpha.jpg";
  desc = `ผู้หญิงแบบ Alpha คือคนที่มีความมั่นใจสูงและรู้คุณค่าของตัวเองอย่างชัดเจน
เธอมักเป็นผู้นำ กล้าตัดสินใจ และไม่กลัวความท้าทาย
มีเป้าหมายในชีวิตชัดเจน และมุ่งมั่นทำให้สำเร็จ
บุคลิกดูน่าเกรงขาม แต่ก็มีเสน่ห์ดึงดูดคนรอบข้าง
ในความรักเธอเลือกคนที่ให้เธอเป็นผู้นำในความสัมพันธ์และไม่ลดมาตรฐานของตัวเอง`;
}
else if (type === "omega") {
  title = "OMEGA SOUL 🌙";
  image = "omega.jpg";
  desc = `ผู้หญิงแบบ Omega เป็นคนที่รักความเป็นตัวของเธอ 
  เธอไม่ชอบการบังคับหรือความสัมพันธ์ที่เหนื่อยจนทำให้เธอหมดพลังงาน
เธอมีโลกส่วนตัวสูง ชอบใช้เวลาอยู่กับความคิดและสิ่งที่ตัวเองสนใจ
มักมีมุมมองลึกซึ้งและแตกต่างจากคนทั่วไปในความรัก 
เธอต้องการคนที่เข้าใจตัวตนของเธอและเป็นผู้นำเธอในความสัมพันธ์`;
}

// แสดงผล
document.getElementById("title").innerText = title;
document.getElementById("desc").innerText = desc;
document.getElementById("image").src = image;
</script>

</body>
</html>
