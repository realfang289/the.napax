<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<!-- 🔥 สำคัญมาก -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ผลลัพธ์ของคุณ</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* container */
.box {
  max-width: 500px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* title */
h1 {
  font-size: 22px;
  margin-bottom: 15px;
}

/* image */
img {
  width: 100%;
  height: auto;
  border-radius: 16px;
  margin-bottom: 20px;
  background: #000;
}

/* text */
p {
  opacity: 0.85;
  white-space: pre-line;
  text-align: left;
  line-height: 1.6;
  font-size: 14px;
}

/* ปุ่ม */
.buttons {
  margin-top: 25px;
}

.btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: white;
  text-decoration: none;
  font-size: 15px;
  transition: 0.2s;
}

/* hover desktop */
.btn:hover {
  background: white;
  color: black;
}

/* mobile feedback */
.btn:active {
  transform: scale(0.97);
  opacity: 0.8;
}

/* animation */
.fade {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="box fade">
  <h1 id="title"></h1>

  <img id="image" src="">

  <p id="desc"></p>

  <div class="buttons">
    <a href="index.html" class="btn">🔄 ทำแบบทดสอบอีกครั้ง</a>
    <button class="btn" onclick="shareResult()">📲 แชร์ผลลัพธ์</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

let title = "ไม่พบผลลัพธ์";
let desc = "กรุณาทำแบบทดสอบใหม่อีกครั้ง";
let image = "";

if (type === "sigma") {
  title = "SIGMA MIND 🖤";
  image = "sigma.jpg";
  desc = `ผู้หญิงแบบ Sigma ความมั่นใจโดยไม่ต้องพึ่งพาการยอมรับจากกลุ่ม
เธอมีบุคลิกที่ลึกลับและเป็นอิสระ พึ่งพาตนเองได้ดีเยี่ยมจนไม่จำเป็นต้องเดินตามกระแสสังคมใดๆ
สามารถอยู่คนเดียวได้อย่างมีความสุข และเลือกคบคนอย่างมีมาตรฐาน
ในความรัก เธอจะเปิดเผยตัวตนจริงๆเฉพาะคนที่เธอเลือกเท่านั้น`;
}
else if (type === "beta") {
  title = "BETA HEART 💖";
  image = "beta.jpg";
  desc = `ผู้หญิงแบบ Beta เป็นคนอ่อนโยน ใจดี และให้ความสำคัญกับความรู้สึกของคนอื่น
เธอเข้ากับคนง่าย มีความเป็นมิตร และสร้างบรรยากาศสบายใจให้คนรอบตัว
มักหลีกเลี่ยงความขัดแย้ง และเลือกใช้ความเข้าใจมากกว่าการปะทะ
เป็นคนที่คอยสนับสนุนและอยู่เคียงข้างคนสำคัญเสมอ
ในความรัก เธอเป็นคนอบอุ่น ดูแลเอาใจใส่ และรักอย่างจริงใจ`;
}
else if (type === "alpha") {
  title = "ALPHA QUEEN 👑";
  image = "alpha.jpg";
  desc = `ผู้หญิงแบบ Alpha คือคนที่มีความมั่นใจสูงและรู้คุณค่าของตัวเองอย่างชัดเจน
เธอมักเป็นผู้นำ กล้าตัดสินใจ และไม่กลัวความท้าทาย
มีเป้าหมายในชีวิตชัดเจน และมุ่งมั่นทำให้สำเร็จ
บุคลิกดูน่าเกรงขาม แต่ก็มีเสน่ห์ดึงดูดคนรอบข้าง
ในความรักเธอเลือกคนที่ให้เธอเป็นผู้นำในความสัมพันธ์และไม่ลดมาตรฐานของตัวเอง`;
}
else if (type === "omega") {
  title = "OMEGA SOUL 🌙";
  image = "omega.jpg";
  desc = `ผู้หญิงแบบ Omega เป็นคนที่รักความเป็นตัวของเธอ 
เธอไม่ชอบการบังคับหรือความสัมพันธ์ที่เหนื่อยจนทำให้เธอหมดพลังงาน
เธอมีโลกส่วนตัวสูง ชอบใช้เวลาอยู่กับความคิดและสิ่งที่ตัวเองสนใจ
มักมีมุมมองลึกซึ้งและแตกต่างจากคนทั่วไปในความรัก 
เธอต้องการคนที่เข้าใจตัวตนของเธอและเป็นผู้นำเธอในความสัมพันธ์`;
}

document.getElementById("title").innerText = title;
document.getElementById("desc").innerText = desc;
document.getElementById("image").src = image;

/* แชร์ */
function shareResult(){
  const text = "ฉันได้ผลลัพธ์: " + title;

  if(navigator.share){
    navigator.share({
      title: "Personality Test",
      text: text,
      url: window.location.href
    });
  } else {
    alert("แชร์ได้เลย:\n" + text);
  }
}
</script>

</body>
</html>
