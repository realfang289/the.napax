<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ผลลัพธ์ของคุณ</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      padding: 40px;
    }
    .box {
      max-width: 700px;
      margin: auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      line-height: 1.7;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    p {
      opacity: 0.85;
      white-space: pre-line;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 30px;
      border: 1px solid #444;
      padding: 10px;
      text-decoration: none;
      color: white;
    }
    a:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>

<div class="box">
  <h1 id="title"></h1>
  <p id="desc"></p>

  <a href="index.html">ทำแบบทดสอบอีกครั้ง</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

let title = "";
let desc = "";

if (type === "alpha") {
  title = "ALPHA QUEEN 👑";
  desc = `ผู้หญิง Alpha คือผู้นำโดยธรรมชาติที่มาพร้อมความมั่นใจเต็มเปี่ยมและบุคลิกที่น่าเกรงขาม
เธอมีความเด็ดขาด กล้าตัดสินใจ และสื่อสารอย่างตรงไปตรงมาเพื่อพุ่งชนเป้าหมายที่ตั้งไว้
ความทะเยอทะยานคือแรงขับเคลื่อนหลัก ทำให้เธอไม่หยุดพัฒนาตัวเองและมาตรฐานชีวิตให้สูงอยู่เสมอ
แม้จะดูแข็งแกร่งและพึ่งพาตัวเองได้ดีเยี่ยม แต่เธอก็มีเสน่ห์ดึงดูดใจจนผู้คนมักยกให้เป็นศูนย์กลาง
เธอไม่ได้รอโอกาสให้เข้ามาหา แต่เป็นคนที่ลุกขึ้นมาสร้างโอกาสและกำหนดโชคชะตาด้วยมือของเธอเอง`;
}
else if (type === "beta") {
  title = "BETA HEART 💖";
  desc = `ผู้หญิง Beta คือผู้สร้างความสมดุลที่มีความฉลาดทางอารมณ์สูงและเต็มไปด้วยความเห็นอกเห็นใจ
เธอเป็นผู้ฟังที่ยอดเยี่ยมและเป็นฟันเฟืองสำคัญที่ช่วยให้การทำงานเป็นทีมหรือความสัมพันธ์ราบรื่น
มีความใจเย็น ประนีประนอม และเลือกที่จะใช้สติแก้ปัญหามากกว่าการใช้อารมณ์หรือการเผชิญหน้า
แม้จะไม่ได้ต้องการเป็นจุดเด่น แต่ความซื่อสัตย์และนิสัยชอบช่วยเหลือทำให้เธอเป็นที่รักของทุกคน
เธอคือผู้อยู่เบื้องหลังความสำเร็จที่คอยประคับประคองและมอบพลังบวกให้คนรอบข้างได้อย่างอบอุ่น`;
}
else if (type === "omega") {
  title = "OMEGA SOUL 🌙";
  desc = `ผู้หญิง Omega คือกลุ่มอัจฉริยะที่รักสันโดษและมีความเป็นตัวของตัวเองสูงโดยไม่สนบรรทัดฐานสังคม
เธอมักใช้เวลาอยู่ในโลกส่วนตัวเพื่อหมกมุ่นกับความรู้หรืองานอดิเรกที่ลึกซึ้งมากกว่าการออกไปปาร์ตี้
แม้ภายนอกจะดูเงียบขรึมหรือเข้าถึงยาก แต่ภายในกลับมีโลกทัศน์ที่กว้างไกลและซื่อสัตย์ต่อความรู้สึก
เธอไม่ชอบการแข่งขันเพื่อแย่งชิงอำนาจ แต่เลือกที่จะใช้ชีวิตตามจังหวะของตนเองอย่างมีอิสระ
ความเสน่ห์ของเธออยู่ที่ความลึกลับและความฉลาดหลักแหลมที่มักจะเผยออกมาให้คนสนิทเห็นเท่านั้น`;
}
else if (type === "sigma") {
  title = "SIGMA MIND 🖤";
  desc = `ผู้หญิง Sigma คือหญิงผู้เด็ดเดี่ยวที่เต็มไปด้วยอำนาจและความมั่นใจโดยไม่ต้องพึ่งพาการยอมรับจากกลุ่ม
เธอมีบุคลิกที่ลึกลับและเป็นอิสระ พึ่งพาตนเองได้ดีเยี่ยมจนไม่จำเป็นต้องเดินตามกระแสสังคมใดๆ
มีความเป็นผู้นำสูงเหมือน Alpha แต่เลือกที่จะใช้ชีวิตนอกกรอบและรักในความสันโดษมากกว่าการเป็นจุดเด่น
การตัดสินใจของเธอเด็ดขาดและเฉียบคม โดยมักจะใช้ความคิดวิเคราะห์อย่างลึกซึ้งก่อนจะลงมือทำเสมอ
เสน่ห์ที่น่าค้นหาของเธอมาจากความสงบนิ่งและตัวตนที่ชัดเจน ซึ่งจะเปิดเผยให้เพียงคนที่เธอเลือกเท่านั้นเห็น`;
}

document.getElementById("title").innerText = title;
document.getElementById("desc").innerText = desc;
</script>

</body>
</html>
