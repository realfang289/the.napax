<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBTI Test</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* container */
.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

/* title */
h1 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 15px;
}

/* progress */
.progress {
  height: 6px;
  background: #333;
  border-radius: 10px;
  margin-bottom: 10px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
  transition: 0.3s;
}

/* step */
.step {
  text-align: right;
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 20px;
}

/* question */
.question {
  font-size: 17px;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* answer */
.answer {
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #444;
  background: #1a1a1a;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

.answer:active {
  transform: scale(0.97);
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧠 MBTI Test</h1>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="step" id="step"></div>

  <div id="quiz"></div>
</div>

  E:0, I:0,
  S:0, N:0,
  T:0, F:0,
  J:0, P:0
};

let current = 0;

const questions = [

/* E vs I */
{

    {text:"ใช้เหตุผลนำทาง", type:"T"},

  ]

];


function loadQ(){
  const quiz = document.getElementById("quiz");
  const q = questions[current];

  document.getElementById("step").innerText =
    `ข้อ ${current+1} / ${questions.length}`;

  quiz.innerHTML = `<div class="question">${q.question}</div>`;

  q.answers.forEach(a=>{
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = a.text;

    div.onclick = ()=>{
      score[a.type]++;
      current++;

      document.getElementById("progress").style.width =
        (current/questions.length)*100 + "%";

      if(current < questions.length){
        loadQ();
      } else {
        showResult();
      }
    };

    quiz.appendChild(div);
  });
}

function showResult(){
  const type =
    (score.E>score.I?"E":"I")+
    (score.S>score.N?"S":"N")+
    (score.T>score.F?"T":"F")+
    (score.J>score.P?"J":"P");

  window.location.href = "mbti-result.html?type=" + type;
}

loadQ();
</script>

</body>
</html>
